<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Logo Converter Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: white;
      text-align: center;
      padding: 40px;
    }

    .container {
      background: #111827;
      padding: 30px;
      border-radius: 16px;
      max-width: 520px;
      margin: auto;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 26px;
    }

    p {
      color: #cbd5f5;
      font-size: 14px;
    }

    .links a {
      color: #60a5fa;
      margin: 0 8px;
      text-decoration: none;
    }

    .upload-box {
      margin-top: 20px;
      padding: 25px;
      border: 2px dashed #334155;
      border-radius: 12px;
      cursor: pointer;
    }

    .upload-box:hover {
      background: #1e293b;
    }

    input {
      display: none;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      font-size: 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      margin-right: 10px;
    }

    .btn-primary {
      background: #3b82f6;
      color: white;
    }

    .btn-secondary {
      background: #10b981;
      color: white;
    }

    .btn-secondary:disabled {
      background: #374151;
      cursor: not-allowed;
    }

    .preview {
      margin-top: 20px;
    }

    img {
      max-width: 200px;
      border-radius: 8px;
      background: white;
      padding: 5px;
    }

    .success {
      margin-top: 15px;
      color: #22c55e;
      display: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>⚡ Logo Converter Pro</h1>
    <p>Convert any logo into 256px and 512px PNGs instantly.</p>

    <div class="links">
      <a href="https://www.1000logos.net/" target="_blank">1000logos</a> |
      <a href="https://seeklogo.com/" target="_blank">seeklogo</a>
    </div>

    <label class="upload-box" id="dropZone">
      Click or drag an image here
      <input type="file" id="fileInput" accept="image/*" />
    </label>

    <div class="preview" id="preview"></div>

    <div>
      <button class="btn-secondary" id="download256" disabled>Download 256x256</button>
      <button class="btn-primary" id="download512" disabled>Download 512x512</button>
    </div>

    <div class="success" id="successMsg">
      Ready to download 🚀
    </div>
  </div>

  <script>
    let uploadedImage = null;
    let fileName = "image";

    const fileInput = document.getElementById("fileInput");
    const preview = document.getElementById("preview");
    const dropZone = document.getElementById("dropZone");

    const btn256 = document.getElementById("download256");
    const btn512 = document.getElementById("download512");

    dropZone.addEventListener("click", () => fileInput.click());

    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.style.background = "#1e293b";
    });

    dropZone.addEventListener("dragleave", () => {
      dropZone.style.background = "transparent";
    });

    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      handleFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener("change", () => {
      handleFile(fileInput.files[0]);
    });

    function handleFile(file) {
      if (!file) return;

      fileName = file.name.split(".")[0];

      const reader = new FileReader();
      reader.onload = function (e) {
        uploadedImage = new Image();
        uploadedImage.src = e.target.result;

        uploadedImage.onload = () => {
          preview.innerHTML = `<img src="${uploadedImage.src}" />`;

          btn256.disabled = false;
          btn512.disabled = false;

          document.getElementById("successMsg").style.display = "block";
        };
      };
      reader.readAsDataURL(file);
    }

    function resize(size) {
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
    
      const ctx = canvas.getContext("2d");
    
      // White background
      ctx.fillStyle = "white";
      ctx.fillRect(0, 0, size, size);
    
      // Maintain aspect ratio
      const scale = Math.min(size / uploadedImage.width, size / uploadedImage.height);
      const w = uploadedImage.width * scale;
      const h = uploadedImage.height * scale;
    
      // ✅ CENTER the image (this is the key fix)
      const x = (size - w) / 2;
      const y = (size - h) / 2;
    
      ctx.drawImage(uploadedImage, x, y, w, h);
    
      // Download
      const link = document.createElement("a");
      link.download = `${fileName}.${size}x${size}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    btn256.addEventListener("click", () => resize(256));
    btn512.addEventListener("click", () => resize(512));
  </script>
</body>
</html>
